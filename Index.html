<!DOCTYPE html>
<html lang="bn" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidStream - বাংলা ভিডিও প্ল্যাটফর্ম</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#181818;--card:#272727;--hover:#3f3f3f;--red:#ff0000;--text:#f1f1f1;--muted:#aaa;--border:#393939;--blue:#3ea6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#555;border-radius:3px}
a{text-decoration:none;color:inherit}

/* NAVBAR */
.top-nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:56px;position:fixed;top:0;width:100%;z-index:1050;display:flex;align-items:center;gap:12px}
.nav-logo{color:var(--red);font-weight:800;font-size:1.3rem;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.nav-logo i{font-size:1.7rem}
.nav-search{max-width:560px;flex:1;margin:0 auto}
.nav-search .input-group{border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.nav-search input{background:#121212;border:none;color:#fff;padding:7px 16px;font-size:.9rem}
.nav-search input:focus{background:#121212;color:#fff;box-shadow:inset 0 0 0 1px var(--blue)}
.nav-search .btn-search{background:var(--card);border:none;color:#fff;padding:7px 18px}
.nav-right{display:flex;align-items:center;gap:4px}
.icon-btn{color:var(--text);font-size:1.15rem;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;position:relative}
.icon-btn:hover{background:var(--hover)}
.notif-dot{position:absolute;top:4px;right:4px;background:var(--red);border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.user-avatar-btn{width:32px;height:32px;border-radius:50%;overflow:hidden;cursor:pointer;border:none;padding:0;background:var(--card)}
.user-avatar-btn img{width:100%;height:100%;object-fit:cover}

/* SIDEBAR */
.side-nav{position:fixed;left:0;top:56px;width:220px;height:calc(100vh - 56px);background:var(--bg);overflow-y:auto;padding:8px 0;z-index:1040;transition:transform .25s ease}
.side-nav.hide{transform:translateX(-220px)}
.side-item{display:flex;align-items:center;gap:14px;padding:9px 20px;color:var(--text);cursor:pointer;font-size:.88rem;border-radius:10px;margin:1px 8px;transition:background .15s}
.side-item:hover,.side-item.on{background:var(--hover)}
.side-item i{font-size:1.15rem;width:22px;text-align:center}
.side-divider{border-top:1px solid var(--border);margin:8px 14px}
.side-label{padding:6px 20px;color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* MAIN */
.page-wrap{margin-left:220px;margin-top:56px;padding:20px;min-height:calc(100vh - 56px);transition:margin-left .25s ease}
.page-wrap.full{margin-left:0}

/* VIDEO CARD */
.vid-card{cursor:pointer;margin-bottom:14px;transition:transform .15s}
.vid-card:hover{transform:translateY(-2px)}
.vid-card .thumb{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;position:relative;background:#1a1a1a}
.vid-card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.vid-card:hover .thumb img{transform:scale(1.03)}
.vid-card .dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;padding:2px 6px;border-radius:4px;font-size:.72rem;font-weight:500}
.vid-card .info{display:flex;gap:10px;padding:10px 2px 0}
.vid-card .av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card);cursor:pointer}
.vid-card .av img{width:100%;height:100%;object-fit:cover}
.vid-card .meta h3{font-size:.9rem;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0}
.vid-card .meta p{color:var(--muted);font-size:.78rem;margin:3px 0 0}

/* WATCH */
.watch-grid{display:grid;grid-template-columns:1fr 380px;gap:20px}
.player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}
.player-box video,.player-box iframe{width:100%;height:100%;border:none}
.vid-title{font-size:1.15rem;font-weight:600;margin:12px 0 8px}
.act-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;background:var(--card);color:#fff;border:none;font-size:.85rem;cursor:pointer;transition:background .15s}
.act-btn:hover{background:var(--hover)}
.act-btn.lit{background:var(--blue);color:#000}
.sub-btn{background:var(--red);font-weight:600;color:#fff}
.sub-btn.done{background:var(--card);color:var(--text)}
.ch-row{display:flex;align-items:center;gap:12px;padding:14px 0}
.ch-av{width:44px;height:44px;border-radius:50%;overflow:hidden;background:var(--card);cursor:pointer;flex-shrink:0}
.ch-av img{width:100%;height:100%;object-fit:cover}

/* COMMENTS */
.cmt-input{display:flex;gap:10px;margin:16px 0}
.cmt-input img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.cmt-input input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:#fff;padding:6px 0;font-size:.9rem}
.cmt-input input:focus{outline:none;border-color:#fff}
.cmt-item{display:flex;gap:10px;margin-bottom:14px}
.cmt-item .c-av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card);cursor:pointer}
.cmt-item .c-av img{width:100%;height:100%;object-fit:cover}

/* SUGGEST CARD */
.sg-card{display:flex;gap:8px;margin-bottom:10px;cursor:pointer;padding:4px;border-radius:8px}
.sg-card:hover{background:var(--hover)}
.sg-card .sg-thumb{width:160px;min-width:160px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#1a1a1a}
.sg-card .sg-thumb img{width:100%;height:100%;object-fit:cover}
.sg-card .sg-meta h4{font-size:.82rem;font-weight:500;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sg-card .sg-meta p{font-size:.72rem;color:var(--muted);margin:3px 0 0}

/* AUTH */
.auth-box{max-width:420px;margin:50px auto;background:var(--card);border-radius:16px;padding:36px}
.form-control,.form-select{background:#121212;border:1px solid var(--border);color:#fff}
.form-control:focus,.form-select:focus{background:#121212;color:#fff;border-color:var(--blue);box-shadow:0 0 0 2px rgba(62,166,255,.15)}
.btn-red{background:var(--red);color:#fff;border:none;font-weight:600;padding:10px 24px;border-radius:8px}
.btn-red:hover{background:#d00;color:#fff}

/* UPLOAD */
.drop-zone{border:2px dashed var(--border);border-radius:16px;padding:50px 20px;text-align:center;cursor:pointer;transition:all .3s}
.drop-zone:hover{border-color:var(--blue);background:rgba(62,166,255,.03)}
.drop-zone i{font-size:3.5rem;color:var(--muted)}

/* CHANNEL HEADER */
.ch-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:28px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.ch-header .big-av{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid var(--red);flex-shrink:0}
.ch-header .big-av img{width:100%;height:100%;object-fit:cover}

/* NOTIFICATION PANEL */
.notif-box{position:fixed;top:56px;right:50px;width:370px;max-height:480px;overflow-y:auto;background:var(--card);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1060;display:none}
.notif-box.open{display:block}
.notif-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-row:hover{background:var(--hover)}
.notif-row.fresh{background:rgba(62,166,255,.06)}
.notif-row img{width:44px;height:44px;border-radius:8px;object-fit:cover}

/* CHIPS */
.chip{display:inline-block;padding:5px 14px;border-radius:8px;background:var(--card);color:#fff;font-size:.82rem;cursor:pointer;border:none;margin:0 3px 6px;transition:all .15s}
.chip:hover,.chip.on{background:#fff;color:#000}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty i{font-size:4rem;margin-bottom:12px;display:block}

/* PROGRESS */
.upload-progress{display:none;margin-top:14px}
.upload-progress.show{display:block}

/* TOAST */
.toast-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999}

/* ANIMATION */
.fade-up{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:1200px){.watch-grid{grid-template-columns:1fr}.sg-section{display:none}}
@media(max-width:768px){
  .side-nav{transform:translateX(-220px)}.side-nav.mob-show{transform:translateX(0)}
  .page-wrap{margin-left:0!important}
  .nav-search{display:none!important}
  .ch-header{flex-direction:column;text-align:center}
  .sg-card .sg-thumb{width:120px;min-width:120px}
}
</style>
</head>

// ======================== AUTH ========================
function register(name,email,pass){
  if(!email.endsWith('@gmail.com')) return toast('শুধুমাত্র Gmail ব্যবহার করুন!','danger');
  if(pass.length<6) return toast('পাসওয়ার্ড মিনিমাম ৬ অক্ষর!','danger');
  const users = DB.g('users');
  if(users.find(u=>u.email===email)) return toast('এই ইমেইল আগে থেকে আছে!','danger');
  const u = {
    id:'u_'+Date.now(), name, email, pass,
    avatar:`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}&color=fff&size=150&bold=true`,
    subs:0, joined:Date.now()
  };
  users.push(u); DB.s('users',users);
  me=u; DB.s('me',u);
  toast('স্বাগতম '+name+'! 🎉','success');
  go('home');
}
function login(email,pass){
  const u = DB.g('users').find(x=>x.email===email&&x.pass===pass);
  if(!u) return toast('ইমেইল বা পাসওয়ার্ড ভুল!','danger');

  toast('স্বাগতম '+u.name+'!','success');
  go('home');
}
function logout(){
  me=null; DB.s('me',null);
  toast('লগআউট সফল','info');
  go('home');
}

// ======================== TELEGRAM UPLOAD ========================
async function telegramUpload(file, title, desc, thumbUrl, cat){
  if(!me) return toast('প্রথমে লগইন করুন!','danger');

  const pBar = document.getElementById('pBar');
  const pWrap = document.getElementById('pWrap');
  const pText = document.getElementById('pText');
  if(pWrap) pWrap.classList.add('show');
  if(pBar) pBar.style.width='5%';
  if(pText) pText.textContent='টেলিগ্রামে আপলোড হচ্ছে...';

  let tgFileId='', tgMsgId='';

  // Upload to Telegram
  if(file && file.size > 0){
    try{
      const fd = new FormData();
      fd.append('chat_id', CFG.channelId);
      fd.append('video', file);
      fd.append('caption', '📹 '+title+'\n\n'+desc);
      fd.append('parse_mode','HTML');

      if(pBar) pBar.style.width='15%';
      if(pText) pText.textContent='ভিডিও পাঠানো হচ্ছে... ('+((file.size/1024/1024).toFixed(1))+' MB)';

      const xhr = new XMLHttpRequest();
      const resp = await new Promise((resolve, reject) => {
        xhr.upload.onprogress = (e) => {
          if(e.lengthComputable && pBar){
            const pct = 15 + (e.loaded/e.total)*70;
            pBar.style.width = pct+'%';
            pText.textContent = 'আপলোড হচ্ছে... '+Math.round(e.loaded/e.total*100)+'%';
          }
        };
        xhr.onload = () => resolve(JSON.parse(xhr.responseText));
        xhr.onerror = () => reject(new Error('Upload failed'));
        xhr.open('POST', CFG.tgApi+'/bot'+CFG.botToken+'/sendVideo');
        xhr.send(fd);
      });

      if(pBar) pBar.style.width='88%';

      if(resp.ok && resp.result){
        tgMsgId = resp.result.message_id;
        if(resp.result.video) tgFileId = resp.result.video.file_id;
        else if(resp.result.document) tgFileId = resp.result.document.file_id;
        if(pText) pText.textContent='টেলিগ্রামে সেভ হয়েছে ✓';
      } else {
        console.warn('Telegram response:', resp);
        toast('টেলিগ্রাম আপলোড সমস্যা: '+(resp.description||'Unknown'),'warning');
      }
    }catch(e){
      console.error('TG Upload Error:', e);
      toast('টেলিগ্রাম আপলোডে সমস্যা হয়েছে','warning');
    }
  }

  if(pBar) pBar.style.width='95%';

  // Save to DB
  const vid = {
    id:'v_'+Date.now(),
    uid: me.id,
    title: title,
    desc: desc,
    thumb: thumbUrl || 'https://placehold.co/640x360/272727/fff?text='+encodeURIComponent(title.substring(0,15)),
    dur: file ? guessDur(file.size) : '0:00',
    views: 0,
    tgFileId: tgFileId,
    tgMsgId: tgMsgId,
    cat: cat || 'other',
    at: Date.now()
  };
  const vids = DB.g('videos');
  vids.unshift(vid);
  DB.s('videos', vids);

  // Notify subscribers
  const mySubs = DB.g('subs').filter(s=>s.chId===me.id && s.bell);
  if(mySubs.length){
    const notifs = DB.g('notifs');
    mySubs.forEach(s=>{
      notifs.unshift({
        id:'n_'+Date.now()+'_'+s.uid,
        uid:s.uid, type:'video', from:me.id, vid:vid.id,
        msg: me.name+' নতুন ভিডিও আপলোড করেছে: "'+title+'"',
        img:vid.thumb, read:false, at:Date.now()
      });
    });
    DB.s('notifs', notifs);
  }

  if(pBar) pBar.style.width='100%';
  if(pText) pText.textContent='আপলোড সম্পন্ন! ✅';

  setTimeout(()=>{
    toast('ভিডিও সফলভাবে আপলোড হয়েছে! 🎉','success');
    go('watch',{v:vid.id});
  },600);
}

function getStreamUrl(video){
  if(video.tgFileId){
    // Build Telegram file URL via getFile API
    return {type:'telegram', fileId: video.tgFileId};
  }
  // Fallback demo video
  return {type:'direct', url:'https://www.w3schools.com/html/mov_bbb.mp4'};
}

async function loadTgVideo(fileId, videoEl){
  try{
    const r = await fetch(CFG.tgApi+'/bot'+CFG.botToken+'/getFile?file_id='+fileId);
    const d = await r.json();
    if(d.ok && d.result.file_path){
      videoEl.src = CFG.tgApi+'/file/bot'+CFG.botToken+'/'+d.result.file_path;
      videoEl.load();
    } else {
      toast('ভিডিও লোড করা যায়নি','danger');
    }
  }catch(e){
    console.error('Stream error:', e);
    toast('ভিডিও স্ট্রিম সমস্যা','danger');
  }
}

// ======================== SOCIAL ========================
function doLike(vid, type){
  if(!me) return toast('লগইন করুন!','warning');
  let likes = DB.g('likes');
  const idx = likes.findIndex(l=>l.vid===vid && l.uid===me.id);
  if(idx>=0){
    if(likes[idx].type===type) likes.splice(idx,1);

  } else {

  }

  renderActions(vid);
}

function postComment(vid,text){
  if(!me) return toast('লগইন করুন!','warning');
  if(!text.trim()) return;
  const cmts = DB.g('comments');
  cmts.unshift({id:'c_'+Date.now(),vid,uid:me.id,text:text.trim(),at:Date.now()});
  DB.s('comments',cmts);

  // Notify video owner
  const video = DB.g('videos').find(v=>v.id===vid);
  if(video && video.uid!==me.id){

    notifs.unshift({
      id:'n_'+Date.now(), uid:video.uid, type:'comment', from:me.id, vid:vid,
      msg: me.name+' কমেন্ট করেছে: "'+text.substring(0,50)+'"',
      img:video.thumb, read:false, at:Date.now()
    });

function toggleSub(chId){
  if(!me) return toast('লগইন করুন!','warning');
  if(chId===me.id) return toast('নিজেকে সাবস্ক্রাইব করা যায় না!','info');
  let subs = DB.g('subs');
  const users = DB.g('users');
  const idx = subs.findIndex(s=>s.uid===me.id && s.chId===chId);
  const chIdx = users.findIndex(u=>u.id===chId);

  if(idx>=0){
    subs.splice(idx,1);
    if(chIdx>=0) users[chIdx].subs = Math.max(0,(users[chIdx].subs||0)-1);
    toast('আনসাবস্ক্রাইব হয়েছে','info');
  } else {
    subs.push({uid:me.id, chId, bell:true, at:Date.now()});
    if(chIdx>=0) users[chIdx].subs = (users[chIdx].subs||0)+1;
    toast('সাবস্ক্রাইব হয়েছে! 🔔','success');
    // Notify channel
    const notifs = DB.g('notifs');
    notifs.unshift({
      id:'n_'+Date.now(), uid:chId, type:'sub', from:me.id,
      msg: me.name+' আপনার চ্যানেল সাবস্ক্রাইব করেছে!',
      img:me.avatar, read:false, at:Date.now()
    });
    DB.s('notifs',notifs);
  }
  DB.s('subs',subs); DB.s('users',users);
  syncMe();
}

function toggleBell(chId){
  if(!me) return;
  let subs = DB.g('subs');
  const s = subs.find(x=>x.uid===me.id && x.chId===chId);
  if(s){ s.bell=!s.bell; DB.s('subs',subs); toast(s.bell?'নোটিফিকেশন চালু 🔔':'নোটিফিকেশন বন্ধ 🔕','info'); }
}

function isSub(chId){ return me ? DB.g('subs').some(s=>s.uid===me.id && s.chId===chId) : false; }
function bellOn(chId){ if(!me) return false; const s=DB.g('subs').find(x=>x.uid===me.id && x.chId===chId); return s?s.bell:false; }

function addView(vid){
  const vids = DB.g('videos');
  const v = vids.find(x=>x.id===vid);
  if(v){ v.views=(v.views||0)+1; DB.s('videos',vids); }
}

function syncMe(){
  if(!me) return;
  const u = DB.g('users').find(x=>x.id===me.id);
  if(u){ me=u; DB.s('me',u); }
}

// ======================== HELPERS ========================
function getUser(id){ return DB.g('users').find(u=>u.id===id)||{name:'Unknown',avatar:'https://ui-avatars.com/api/?name=U&size=128',subs:0}; }
function fmtViews(n){ if(!n)return'0'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toString(); }
function guessDur(bytes){ const s=Math.floor(bytes/50000); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60; return h?h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0') : m+':'+String(sec).padStart(2,'0'); }
function timeAgo(ts){
  const d=Date.now()-ts; const m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000),mo=Math.floor(dy/30),y=Math.floor(dy/365);
  if(y)return y+' বছর আগে'; if(mo)return mo+' মাস আগে'; if(dy)return dy+' দিন আগে'; if(h)return h+' ঘণ্টা আগে'; if(m)return m+' মিনিট আগে'; return 'এইমাত্র';
}
function toast(msg,type='info'){
  const a=document.getElementById('toastArea');
  const d=document.createElement('div');
  d.className=`alert alert-${type} alert-dismissible fade show shadow-lg`;
  d.style.cssText='min-width:280px;margin-bottom:6px;font-size:.9rem';
  d.innerHTML=msg+`<button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>`;
  a.appendChild(d); setTimeout(()=>d.remove(),4000);
}
function escHtml(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

          </div>`;}).join('')}

    const player = document.getElementById('mainPlayer');

  renderComments(vid);

function renderActions(vid){
  const likes=DB.g('likes');
  const lc=likes.filter(l=>l.vid===vid&&l.type==='like').length;
  const dc=likes.filter(l=>l.vid===vid&&l.type==='dislike').length;
  const my=me?likes.find(l=>l.vid===vid&&l.uid===me.id):null;
  const el=document.getElementById('actionsArea');
  if(!el) return;
  el.innerHTML=`
    <div class="d-flex rounded-pill overflow-hidden" style="background:var(--card)">
      <button class="act-btn ${my?.type==='like'?'lit':''}" style="border-radius:20px 0 0 20px" onclick="doLike('${vid}','like')">
        <i class="bi bi-hand-thumbs-up${my?.type==='like'?'-fill':''}"></i> ${lc||''}
      </button>
      <div style="width:1px;background:var(--border)"></div>
      <button class="act-btn ${my?.type==='dislike'?'lit':''}" style="border-radius:0 20px 20px 0" onclick="doLike('${vid}','dislike')">
        <i class="bi bi-hand-thumbs-down${my?.type==='dislike'?'-fill':''}"></i> ${dc||''}
      </button>
    </div>
    <button class="act-btn" onclick="shareVid('${vid}')"><i class="bi bi-share"></i> শেয়ার</button>
    <button class="act-btn" onclick="dlVid('${vid}')"><i class="bi bi-download"></i> ডাউনলোড</button>`;
}

function shareVid(vid){
  const url=location.origin+location.pathname+'#watch?v='+vid;
  navigator.clipboard.writeText(url).then(()=>toast('লিংক কপি হয়েছে! 📋','success'));
}

async function dlVid(vid){
  const v=DB.g('videos').find(x=>x.id===vid);
  if(!v) return;
  if(v.tgFileId){
    try{
      const r=await fetch(CFG.tgApi+'/bot'+CFG.botToken+'/getFile?file_id='+v.tgFileId);
      const d=await r.json();
      if(d.ok){
        const url=CFG.tgApi+'/file/bot'+CFG.botToken+'/'+d.result.file_path;
        window.open(url,'_blank');
        toast('ডাউনলোড শুরু হচ্ছে...','info');
      }
    }catch(e){ toast('ডাউনলোড সমস্যা','danger'); }
  } else {
    toast('ডেমো ভিডিও ডাউনলোড','info');
    window.open('https://www.w3schools.com/html/mov_bbb.mp4','_blank');
  }
}

function renderComments(vid){
  const cmts=DB.g('comments').filter(c=>c.vid===vid);
  const el=document.getElementById('cmtSection');
  if(!el) return;
  el.innerHTML=`
    <h6 class="mb-3">${cmts.length} কমেন্ট</h6>
    ${me?`<div class="cmt-input">
      <img src="${me.avatar}" alt="">
      <input type="text" placeholder="কমেন্ট লিখুন..." id="cmtIn" onkeydown="if(event.key==='Enter'){postComment('${vid}',this.value);this.value=''}">
      <button class="btn btn-sm btn-primary rounded-pill ms-2" onclick="postComment('${vid}',document.getElementById('cmtIn').value);document.getElementById('cmtIn').value=''">পোস্ট</button>
    </div>`:`<p style="color:var(--muted);font-size:.85rem" class="mb-3">কমেন্ট করতে <a href="#" onclick="go('login')" style="color:var(--blue)">লগইন</a> করুন</p>`}

          <div style="font-size:.83rem"><strong style="cursor:pointer" onclick="go('channel',{id:'${c.uid}'})">${cu.name}</strong> <span style="color:var(--muted);font-size:.73rem;margin-left:6px">${timeAgo(c.at)}</span></div>

function handleUploadForm(e){
  e.preventDefault();

  telegramUpload(file||null, title, desc, thumb, cat);
  return false;
}

    <div class="rounded overflow-hidden" style="background:var(--card);border:1px solid var(--border)">
      <div class="p-3" style="border-bottom:1px solid var(--border)"><h6 class="mb-0">আমার ভিডিও</h6></div>
      ${vids.length ? `<div class="table-responsive"><table class="table table-dark table-hover mb-0" style="background:transparent;font-size:.88rem">
        <thead><tr><th>ভিডিও</th><th class="text-center">ভিউ</th><th class="text-center">লাইক</th><th class="text-center">কমেন্ট</th><th>স্টোরেজ</th><th>তারিখ</th><th></th></tr></thead>
        <tbody>${vids.map(v=>{
          const vl=DB.g('likes').filter(l=>l.vid===v.id&&l.type==='like').length;
          const vc=DB.g('comments').filter(c=>c.vid===v.id).length;
          return `<tr>
            <td><div class="d-flex align-items-center gap-2" style="cursor:pointer" onclick="go('watch',{v:'${v.id}'})">
              <img src="${v.thumb}" width="80" style="border-radius:6px;aspect-ratio:16/9;object-fit:cover" onerror="this.src='https://placehold.co/80x45/272727/fff?text=V'">
              <div><div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(v.title)}</div><small style="color:var(--muted)">${v.dur}</small></div>
            </div></td>
            <td class="text-center">${fmtViews(v.views)}</td>
            <td class="text-center">${vl}</td>
            <td class="text-center">${vc}</td>
            <td>${v.tgFileId?'<span class="badge bg-success"><i class="bi bi-cloud-check"></i> TG</span>':'<span class="badge bg-secondary">Local</span>'}</td>
            <td><small style="color:var(--muted)">${timeAgo(v.at)}</small></td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation();delVideo('${v.id}')"><i class="bi bi-trash"></i></button></td>
          </tr>`}).join('')}</tbody>
      </table></div>` :
      `<div class="empty py-5"><i class="bi bi-camera-video" style="font-size:3rem"></i><p>এখনো কোন ভিডিও নেই</p><button class="btn btn-red mt-2" onclick="go('upload')">প্রথম ভিডিও আপলোড</button></div>`}
    </div>
  </div>`;
}

function delVideo(vid){
  if(!confirm('ভিডিওটি মুছে ফেলতে চান?')) return;
  DB.s('videos', DB.g('videos').filter(v=>v.id!==vid));
  DB.s('comments', DB.g('comments').filter(c=>c.vid!==vid));
  DB.s('likes', DB.g('likes').filter(l=>l.vid!==vid));
  toast('ভিডিও মুছে ফেলা হয়েছে','success');
  pgStudio();
}

// ======================== PAGE: NOTIFICATIONS ========================
function pgNotifs(){
  if(!me) return go('login');
  const notifs=DB.g('notifs').filter(n=>n.uid===me.id);
  document.getElementById('page').innerHTML=`<div class="fade-up" style="max-width:680px;margin:0 auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5><i class="bi bi-bell me-2"></i>নোটিফিকেশন</h5>
      ${notifs.length?`<button class="btn btn-sm btn-outline-secondary" onclick="markAllRead();pgNotifs()">সব পড়া হয়েছে</button>`:''}
    </div>
    ${notifs.length ? notifs.map(n=>`
      <div class="d-flex gap-3 p-3 mb-2 rounded ${n.read?'':'border'}" style="background:var(--card);cursor:pointer;${n.read?'':'border-color:var(--blue)!important'}" onclick="clickNotif('${n.id}','${n.vid||''}')">
        <img src="${n.img||'https://placehold.co/48/272727/fff?text=N'}" width="52" height="52" style="border-radius:8px;object-fit:cover">
        <div>
          <p class="mb-1" style="font-size:.88rem">${n.msg}</p>
          <small style="color:var(--muted)">${timeAgo(n.at)}</small>
          ${n.read?'':'<span class="badge bg-primary ms-2">নতুন</span>'}
        </div>
      </div>`).join('') :
    `<div class="empty"><i class="bi bi-bell-slash"></i><h5>কোন নোটিফিকেশন নেই</h5></div>`}
  </div>`;
}

// ======================== HASH ROUTING ========================
function route(){
  const h=location.hash.replace('#','');
  if(!h||h==='/') return go('home');
  const [path,qs]=h.split('?');
  const p={};
  if(qs) qs.split('&').forEach(x=>{const[k,v]=x.split('=');p[k]=decodeURIComponent(v);});

  switch(path){
    case 'home': go('home'); break;
    case 'trending': go('trending'); break;
    case 'watch': go('watch',p); break;
    case 'upload': go('upload'); break;
    case 'login': go('login'); break;
    case 'register': go('register'); break;
    case 'search': go('search',p); break;
    case 'mysubs': go('mysubs'); break;
    case 'studio': go('studio'); break;
    case 'notifs': go('notifs'); break;
    default:
      if(path.startsWith('channel/')) go('channel',{id:path.split('/')[1]});
      else go('home');
  }
}

// Close notif panel on outside click
document.addEventListener('click',e=>{
  const nb=document.getElementById('notifBox');
  if(nb.classList.contains('open') && !e.target.closest('.notif-box') && !e.target.closest('[onclick*="openNotifs"]')){
    nb.classList.remove('open');
  }
});

window.addEventListener('hashchange', route);
window.addEventListener('resize',()=>{
  if(innerWidth<=768) sideOpen=false;
  document.getElementById('sideNav').classList.toggle('hide',!sideOpen);
  document.getElementById('page').classList.toggle('full',!sideOpen);
});

// ======================== INIT ========================
DB.init();
route();
</script>
</body>
</html>
